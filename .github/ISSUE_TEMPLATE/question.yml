name: "❓ Question"
description: "Ask a question about the plugin or configuration"
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: "Need help with the configuration or have a general question? Ask it here."

  - type: textarea
    id: question-body
    attributes:
      label: "Your Question"
      description: "Please describe your question or what you are trying to achieve with the plugin."
    validations:
      required: true

  - type: textarea
    id: config-files
    attributes:
      label: "Relevant Configuration Files"
      description: "If applicable, paste your config.yml or relevant configuration snippets here."
      render: yaml
    validations:
      required: false
